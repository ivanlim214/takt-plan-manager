<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takt Plan Manager</title>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@17/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#0d0d0d}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
      justify-content:center;background:#0d0d0d;font-family:'IBM Plex Mono',monospace;gap:18px;z-index:9999}
    .ld-spinner{width:40px;height:40px;border:2px solid #222;border-top-color:#f4a030;
      border-radius:50%;animation:ldspin .8s linear infinite}
    #loading h2{font-size:14px;letter-spacing:3px;color:#f4a030;font-weight:700}
    @keyframes ldspin{to{transform:rotate(360deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <style>

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0d;--surface:#111;--panel:#161616;
      --border:#252525;--border2:#363636;
      --accent:#f4a030;--hi:#efefef;--mid:#666;--lo:#2a2a2a;
      --cw:30px;--rh:22px;
    }
    html,body{background:var(--bg);color:var(--hi);font-family:'IBM Plex Sans',sans-serif}

    /* Topbar */
    .topbar{display:flex;align-items:center;gap:10px;background:var(--surface);
      border-bottom:1px solid var(--border);padding:0 18px;height:46px;
      position:sticky;top:0;z-index:100;flex-wrap:nowrap}
    .app-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:var(--accent);white-space:nowrap}
    .tab-pills{display:flex;gap:2px;background:#0a0a0a;border:1px solid var(--border);
      border-radius:5px;padding:2px;flex-shrink:0}
    .tab-pill{padding:4px 14px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.8px;
      border:none;background:transparent;color:var(--mid);cursor:pointer;
      font-family:'IBM Plex Mono',monospace;transition:.12s;white-space:nowrap}
    .tab-pill:hover{color:var(--hi)}
    .tab-pill.active{background:var(--accent);color:#000}
    .block-tabs{display:flex;gap:3px}
    .block-tab{padding:4px 12px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:.8px;
      border:1px solid var(--border);background:transparent;color:var(--mid);
      cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:.12s;white-space:nowrap}
    .block-tab:hover{border-color:var(--accent);color:var(--hi)}
    .block-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}

    /* Stats bar */
    .stats-bar{display:flex;align-items:center;gap:22px;flex-wrap:wrap;
      padding:8px 18px;background:var(--panel);border-bottom:1px solid var(--border)}
    .stat-item{display:flex;flex-direction:column;gap:1px}
    .stat-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);font-family:'IBM Plex Mono',monospace}
    .stat-val{font-size:20px;font-family:'Bebas Neue';letter-spacing:1px;line-height:1.1;color:var(--hi)}
    .stat-val.accent{color:var(--accent)}.stat-val.green{color:#70AD47}.stat-val.amber{color:#FFC000}.stat-val.blue{color:#5B9BD5}
    .pb-wrap{margin-left:auto;min-width:170px}
    .pb-track{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px}
    .pb-fill{height:100%;background:var(--accent);border-radius:3px;transition:.4s}
    .pb-lbl{font-size:8px;color:var(--mid);margin-top:2px;font-family:'IBM Plex Mono',monospace}

    /* Filter row */
    .filter-row{display:flex;align-items:center;gap:4px;padding:5px 18px;
      background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;min-height:36px}
    .flbl{font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid);
      font-family:'IBM Plex Mono',monospace;white-space:nowrap}
    .fbtn{padding:3px 8px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.5px;
      border:1px solid var(--border);background:transparent;color:var(--mid);
      cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:.12s;white-space:nowrap}
    .fbtn:hover{border-color:var(--accent);color:var(--hi)}
    .fbtn.active{background:var(--accent);color:#000;border-color:var(--accent)}
    .fsep{width:1px;height:18px;background:var(--border);margin:0 5px;flex-shrink:0}
    .scroll-hint{margin-left:auto;font-size:8px;letter-spacing:1.5px;color:var(--lo);font-family:'IBM Plex Mono',monospace}

    /* Takt grid */
    .grid-scroll{overflow:auto;max-height:calc(100vh - 188px)}
    .grid-scroll::-webkit-scrollbar{width:4px;height:4px}
    .grid-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .grid-tbl{border-collapse:collapse;table-layout:fixed}
    .sticky-fl{position:sticky;left:0;width:34px;min-width:34px;z-index:11}
    .sticky-tr{position:sticky;left:34px;width:44px;min-width:44px;z-index:11}
    .sticky-zn{position:sticky;left:78px;width:50px;min-width:50px;z-index:11}
    .thead-row th{position:sticky;top:0;z-index:10;background:var(--panel)}
    .phase-row th{position:sticky;top:38px;z-index:10;background:var(--panel)}
    .th-hd{font-family:'IBM Plex Mono',monospace;font-size:7px;letter-spacing:.8px;color:var(--mid);
      text-align:center;border-right:1px solid var(--border);
      background:var(--surface)!important;border-bottom:1px solid var(--border)!important;
      height:38px;vertical-align:middle}
    .takt-hd-cell{width:var(--cw);min-width:var(--cw);padding:0;border-right:1px solid var(--border);
      vertical-align:top;position:sticky;top:0;z-index:9;background:var(--panel);height:58px}
    .phase-hd-cell{width:var(--cw);min-width:var(--cw);padding:0;border-right:1px solid var(--border);
      vertical-align:top;position:sticky;top:58px;z-index:9;background:#0f0f0f;height:18px}
    .takt-box{display:flex;flex-direction:column;align-items:center;padding:3px 0 2px;
      background:var(--panel);height:58px;box-sizing:border-box;gap:1px}
    .takt-box.today{background:rgba(244,160,48,.2)!important}
    .tn{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;color:var(--hi);line-height:1.3}
    .td2{font-family:'IBM Plex Mono',monospace;font-size:7.5px;color:#aaa;line-height:1;
      writing-mode:vertical-rl;transform:rotate(180deg);height:38px;overflow:hidden;letter-spacing:.5px;
      font-weight:600}
    .takt-box.today .td2{color:#f4a030}
    .ph-fixed{background:var(--panel)!important;height:18px}
    .ph-lbl{font-family:'Bebas Neue';font-size:10px;letter-spacing:2px;color:var(--accent);
      padding:1px 4px;white-space:nowrap;line-height:18px}
    .ph-empty{height:18px}
    .data-row td{height:var(--rh);border-bottom:1px solid rgba(24,24,24,.9);padding:0}
    .floor-top td{border-top:1px solid var(--border2)!important}
    .td-fl{background:var(--panel)!important;border-right:1px solid var(--border)}
    .td-tr{background:var(--panel)!important;border-right:1px solid var(--border);text-align:center}
    .td-zn{background:var(--panel)!important;border-right:2px solid var(--border2)}
    .fl-num{font-family:'Bebas Neue';font-size:14px;color:var(--accent);text-align:center;line-height:var(--rh)}
    .tbadge{display:inline-block;font-size:6px;font-weight:700;letter-spacing:.4px;
      padding:1px 3px;border-radius:2px;font-family:'IBM Plex Mono',monospace}
    .tbadge-arch{background:rgba(91,155,213,.15);color:#5B9BD5;border:1px solid rgba(91,155,213,.25)}
    .tbadge-mep{background:rgba(112,173,71,.15);color:#70AD47;border:1px solid rgba(112,173,71,.25)}
    .znlbl{font-size:6.5px;color:var(--mid);font-family:'IBM Plex Mono',monospace;padding:0 4px;white-space:nowrap}
    .cell{width:var(--cw);height:var(--rh);border-right:1px solid rgba(18,18,18,.8);
      padding:2px;text-align:center;vertical-align:middle;cursor:default;position:relative}
    .cell:hover{z-index:10;outline:1.5px solid rgba(255,255,255,.5)}
    .cell.today-col{box-shadow:inset 0 0 0 1px rgba(244,160,48,.5)!important}
    .ci{display:inline-block;width:24px;height:16px;line-height:16px;
      border-radius:2px;font-size:6px;font-weight:800;text-align:center;
      vertical-align:middle;font-family:'IBM Plex Mono',monospace}

    /* Legend */
    .legend{padding:8px 18px;background:var(--panel);border-top:1px solid var(--border);
      display:flex;flex-wrap:wrap;gap:5px 12px;align-items:center}
    .leg-title{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);
      font-family:'IBM Plex Mono',monospace}
    .leg-item{display:flex;align-items:center;gap:4px}
    .leg-sw{width:14px;height:11px;border-radius:2px;flex-shrink:0}
    .leg-lbl{font-size:9px;color:var(--mid);white-space:nowrap}
    .leg-sep{width:1px;height:14px;background:var(--border);margin:0 4px}

    /* Tracker */
    .tracker-scroll{overflow:auto;max-height:calc(100vh - 90px)}
    .tracker-scroll::-webkit-scrollbar{width:4px;height:4px}
    .tracker-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
    .tracker-tbl{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace}
    .tracker-tbl thead th{
      position:sticky;top:0;z-index:10;
      background:var(--panel);padding:7px 10px;
      font-size:8px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid);
      text-align:left;border-bottom:2px solid var(--border2);white-space:nowrap}
    .tracker-tbl tbody td{
      border-bottom:1px solid var(--border);padding:4px 10px;
      font-size:11px;vertical-align:middle;white-space:nowrap}
    .tracker-tbl tbody tr:hover td{background:rgba(255,255,255,.015)}
    .tr-group-start td{border-top:2px solid var(--border2)!important}
    .td-trade{min-width:160px;max-width:200px}
    .fl-chip{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;
      border-radius:2px;background:rgba(244,160,48,.1);color:var(--accent);
      border:1px solid rgba(244,160,48,.2)}
    .trd-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;
      border-radius:2px;letter-spacing:.4px}
    .tr-arch{background:rgba(91,155,213,.12);color:#5B9BD5;border:1px solid rgba(91,155,213,.25)}
    .tr-mep{background:rgba(112,173,71,.12);color:#70AD47;border:1px solid rgba(112,173,71,.25)}
    .tr-both{background:rgba(244,160,48,.12);color:var(--accent);border:1px solid rgba(244,160,48,.25)}
    .badge-done{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;
      border-radius:2px;background:rgba(112,173,71,.15);color:#70AD47;border:1px solid rgba(112,173,71,.25)}
    .badge-next{display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;
      border-radius:2px;background:rgba(91,155,213,.12);color:#5B9BD5;border:1px solid rgba(91,155,213,.25)}
    .badge-na{display:inline-block;font-size:9px;padding:1px 7px;color:#333;border:1px solid #222;border-radius:2px}
    input[type=number]{outline:none}
    input[type=number]:focus{border-color:var(--accent)!important;color:var(--hi)!important}
    input[type=number]::-webkit-inner-spin-button{opacity:1}

    @keyframes spin{to{transform:rotate(360deg)}}

    /* Tooltip */
    .tooltip{position:fixed;z-index:9999;background:#0e0e0e;border:1px solid var(--accent);
      border-radius:4px;padding:8px 11px;pointer-events:none;min-width:158px;
      box-shadow:0 6px 28px rgba(0,0,0,.9)}
    .ttr{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px}
    .ttl{font-size:8px;letter-spacing:1px;color:var(--mid);font-family:'IBM Plex Mono',monospace;text-transform:uppercase}
    .ttv{font-size:9px;font-weight:600;color:var(--hi);font-family:'IBM Plex Mono',monospace}

    /* Schedule View */
    .sched-outer{display:flex;flex-direction:column;height:100%;overflow:hidden}
    .sched-scroll{flex:1;overflow:auto;min-height:0}
    .sched-scroll::-webkit-scrollbar{width:8px;height:8px}
    .sched-scroll::-webkit-scrollbar-track{background:#0a0a0a}
    .sched-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
    .sched-scroll::-webkit-scrollbar-thumb:hover{background:#555}
    .sched-scroll::-webkit-scrollbar-corner{background:#0a0a0a}
    .sched-tbl{border-collapse:collapse;font-family:'IBM Plex Mono',monospace;width:max-content}
    .sched-zone-hd{
      position:sticky;left:0;top:0;z-index:30;background:var(--panel);
      min-width:170px;width:170px;padding:0 12px;height:28px;line-height:28px;
      font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);
      border-right:2px solid var(--border2);border-bottom:1px solid var(--border);
      text-align:left;white-space:nowrap}
    .sched-zone-hd-sub{
      position:sticky;left:0;top:29px;z-index:30;background:#0f0f0f;
      border-bottom:2px solid var(--border2);height:20px}
    .sched-trade-hd{
      position:sticky;top:0;z-index:10;background:var(--panel);
      padding:0 10px;height:28px;line-height:28px;
      font-size:9px;font-weight:700;letter-spacing:.5px;
      text-align:center;white-space:nowrap;
      border-bottom:1px solid var(--border);min-width:210px;width:210px}
    .sched-sub-hd{
      position:sticky;top:29px;z-index:10;background:#0f0f0f;
      padding:1px 8px 2px;font-size:7px;letter-spacing:1px;text-transform:uppercase;
      color:var(--mid);text-align:left;white-space:nowrap;height:20px;line-height:18px;
      border-bottom:2px solid var(--border2);min-width:105px;width:105px}
    .sched-row td{border-bottom:1px solid var(--border);vertical-align:top;padding:0}
    .sched-floor-top td{border-top:2px solid var(--border2)!important}
    .sched-part-b td{background:rgba(255,255,255,.008)}
    .sched-row:hover td{background:rgba(255,255,255,.022)!important}
    .sched-zone-cell{
      position:sticky;left:0;z-index:5;background:var(--panel);
      border-right:2px solid var(--border2);padding:6px 10px;
      min-width:170px;width:170px;white-space:nowrap;vertical-align:middle}
    .sched-fl-num{font-family:'Bebas Neue';font-size:17px;color:var(--accent);
      display:block;line-height:1;margin-bottom:2px}
    .sched-zone-lbl{font-size:9px;font-weight:600;color:#999;letter-spacing:.3px;
      font-family:'IBM Plex Sans',sans-serif;margin-right:6px}
    .sched-trd-badge{font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;letter-spacing:.5px;vertical-align:middle}
    .s-arch{background:rgba(91,155,213,.12);color:#5B9BD5;border:1px solid rgba(91,155,213,.25)}
    .s-mep{background:rgba(112,173,71,.12);color:#70AD47;border:1px solid rgba(112,173,71,.25)}
    .sched-cell{min-width:105px;width:105px;padding:0;vertical-align:top;position:relative;transition:background .15s}
    .sched-cell.sched-na{background:rgba(255,255,255,.005)}
    .sched-cell-inner{display:flex;flex-direction:column;padding:5px 8px;gap:3px;min-height:46px;justify-content:center}
    .sched-cell-top{display:flex;align-items:center;gap:5px;min-height:16px}
    .sched-cell-dates{display:flex;align-items:baseline;gap:6px}
    .sched-icon{font-size:10px;line-height:1;flex-shrink:0}
    .sched-status-badge{font-size:7px;font-weight:700;letter-spacing:.4px;padding:1px 5px;border-radius:2px;
      border:1px solid;background:rgba(0,0,0,.3);white-space:nowrap;font-family:'IBM Plex Mono',monospace}
    .sched-date{font-size:12px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;line-height:1;white-space:nowrap}
    .sched-day{font-size:8px;letter-spacing:.3px;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
    .collapse-btn{
      width:18px;height:18px;flex-shrink:0;
      background:transparent;border:1px solid var(--border2);border-radius:2px;
      color:var(--mid);font-size:8px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .12s;font-family:'IBM Plex Mono',monospace;padding:0;line-height:1}
    .collapse-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(244,160,48,.08)}

    /* Cell editor popover */
    .cell-editor{
      position:fixed;z-index:9999;width:240px;
      background:#111;border:1px solid var(--border2);border-radius:6px;
      box-shadow:0 8px 40px rgba(0,0,0,.95);
      font-family:'IBM Plex Mono',monospace;overflow:hidden}
    .ce-header{display:flex;align-items:center;gap:0;padding:8px 10px;background:#161616;position:relative}
    .ce-trade{font-size:11px;font-weight:700;color:var(--hi);letter-spacing:.3px;flex:1}
    .ce-meta{font-size:8px;color:var(--mid);letter-spacing:.5px;margin-right:6px}
    .ce-close{background:transparent;border:none;color:var(--mid);cursor:pointer;
      font-size:10px;padding:2px 4px;border-radius:2px;margin-left:auto;flex-shrink:0}
    .ce-close:hover{color:var(--hi);background:rgba(255,255,255,.06)}
    .ce-info{display:flex;gap:8px;align-items:center;padding:5px 10px;
      border-bottom:1px solid var(--border);background:#0e0e0e}
    .ce-info-lbl{font-size:7px;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid)}
    .ce-info-val{font-size:8px;color:#888}
    .ce-pct-row{display:flex;align-items:center;gap:10px;padding:10px 10px 4px}
    .ce-pct-num{font-family:'Bebas Neue';font-size:28px;letter-spacing:1px;line-height:1;min-width:52px}
    .ce-pct-bar{flex:1;height:4px;background:var(--border);border-radius:3px;overflow:hidden}
    .ce-slider{
      width:calc(100% - 20px);margin:4px 10px 8px;display:block;
      -webkit-appearance:none;appearance:none;
      height:3px;background:var(--border2);border-radius:3px;outline:none;cursor:pointer}
    .ce-slider::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
      background:var(--thumb-color,var(--accent));cursor:pointer;
      border:2px solid #111;box-shadow:0 0 0 2px var(--thumb-color,var(--accent))44}
    .ce-presets{display:flex;gap:4px;padding:0 10px 10px;flex-wrap:wrap}
    .ce-preset{flex:1;min-width:40px;padding:4px 2px;border-radius:3px;font-size:8px;font-weight:700;
      letter-spacing:.4px;border:1px solid var(--border2);background:transparent;
      color:var(--mid);cursor:pointer;font-family:'IBM Plex Mono',monospace;
      transition:.1s;text-align:center;white-space:nowrap}
    .ce-preset:hover{border-color:var(--accent);color:var(--hi)}
    .ce-preset.active{font-weight:800}
    .ce-actions{display:flex;gap:6px;padding:0 10px 10px}
    .ce-btn-cancel{flex:1;padding:6px;border-radius:3px;font-size:9px;font-weight:700;
      letter-spacing:.5px;border:1px solid var(--border2);background:transparent;
      color:var(--mid);cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:.1s}
    .ce-btn-cancel:hover{border-color:#666;color:var(--hi)}
    .ce-btn-save{flex:2;padding:6px;border-radius:3px;font-size:9px;font-weight:800;
      letter-spacing:.8px;border:none;cursor:pointer;
      font-family:'IBM Plex Mono',monospace;transition:.1s;text-transform:uppercase}
    .ce-btn-save:hover{filter:brightness(1.15)}
    .cell{cursor:pointer}
    .cell:hover .ci{outline:2px solid rgba(255,255,255,.5);outline-offset:1px}

    /* ── REPORT TAB ── */
    .report-outer{display:flex;flex-direction:column;height:100%;overflow:hidden}
    .rpt-banner{display:flex;align-items:center;justify-content:space-between;
      padding:12px 24px;background:var(--panel);border-bottom:2px solid var(--accent);flex-shrink:0}
    .rpt-banner-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:3px;color:var(--accent)}
    .rpt-banner-sub{font-size:9px;color:var(--mid);font-family:'IBM Plex Mono',monospace;margin-top:2px;letter-spacing:.5px}
    .rpt-banner-kpis{display:flex;gap:20px}
    .rpt-kpi{display:flex;flex-direction:column;align-items:center;gap:1px}
    .rpt-kpi-val{font-family:'Bebas Neue';font-size:28px;line-height:1}
    .rpt-kpi-val.accent{color:var(--accent)}.rpt-kpi-val.green{color:#4CAF7D}.rpt-kpi-val.amber{color:#F4A030}.rpt-kpi-val.red{color:#E05252}
    .rpt-kpi-lbl{font-size:7.5px;color:var(--mid);font-family:'IBM Plex Mono',monospace;letter-spacing:.5px}

function isLight(hex) {
  const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return (r*299+g*587+b*114)/1000 > 140;
}
function pctToVal(p) {
  if(p >= 100) return "C";
  if(p <= 0)   return null;
  return String(p/100);
}
function tkKey(hex,fl,ri) { return `${hex}|${fl}|${ri}`; }

function PctInput({value, onChange}) {
  const inputRef   = useRef(null);
  const onChangeRef = useRef(onChange); // always holds latest onChange, avoids stale closure
  useEffect(() => { onChangeRef.current = onChange; });

  // Push external value into DOM only when this input is not focused
  useEffect(() => {
    const el = inputRef.current;
    if (el && document.activeElement !== el) {
      el.value = String(value);
    }
  }, [value]);

  const clamp = (v) => Math.max(0, Math.min(100, parseInt(v) || 0));

  const commit = useCallback(() => {
    const el = inputRef.current;
    if (!el) return;
    const v = clamp(el.value);
    el.value = String(v);
    onChangeRef.current(v);
  }, []);

  const numVal = clamp(value);
  const color  = numVal >= 100 ? "#70AD47" : numVal > 0 ? "#FFC000" : "#3a3a3a";
  const bg     = numVal >= 100 ? "rgba(112,173,71,.12)" : numVal > 0 ? "rgba(255,192,0,.1)" : "rgba(255,255,255,.03)";

  return (
    React.createElement('input', {
      ref: inputRef,
      type: "number", min: "0", max: "100", step: "5",
      defaultValue: String(value),
      style: {
        width:54, height:24, background:bg,
        border:`1px solid ${color}`, borderRadius:3,

      onBlur: commit,
      onKeyDown: e => { if (e.key === "Enter") { commit(); e.currentTarget.blur(); } },}
    )
  );
}

// ─── SCHEDULE TAB ─────────────────────────────────────────────────────────────
const TODAY_DATE = new Date(new Date().toDateString());

function fmtDate(iso) {
  if(!iso) return "—";
  const [,m,d] = iso.split("-");
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${parseInt(d)} ${months[parseInt(m)-1]}`;
}

function dayDiff(iso) {
  if(!iso) return null;
  const d = new Date(iso);
  return Math.round((d - TODAY_DATE) / 86400000);
}

function getScheduleStatus(val, startIso, endIso) {
  // val: "C", null, or fractional string like "0.5"
  if(val === "C") return "complete";
  const now = TODAY_DATE;
  const start = startIso ? new Date(startIso) : null;
  const end = endIso ? new Date(endIso) : null;
  if(val !== null && val !== "C") return "inprogress"; // partial
  if(!start) return "notstarted";
  if(now >= start && end && now > end) return "atrisk";
  if(now >= start) return "inprogress";
  return "notstarted";
}

function ScheduleTab({ block, getPct }) {
  const sh = RAW_DATA[block];
  const [floorFilter, setFloorFilter] = useState("all");
  const [collapsedFloors, setCollapsedFloors] = useState(() => new Set(RAW_DATA[block].floors.map(f=>f.f)));

  const toggleFloor = (fl) => setCollapsedFloors(prev => {
    const next = new Set(prev);
    next.has(fl) ? next.delete(fl) : next.add(fl);
    return next;
  });

  const toggleAll = () => {
    const allFloors = sh.floors.map(f=>f.f);
    if(collapsedFloors.size === allFloors.length) setCollapsedFloors(new Set());
    else setCollapsedFloors(new Set(allFloors));
  };

  // Build schedule data: for each floor × zone-pair (ri 0/1 = ARCH, ri 2/3 = MEP)
  const scheduleData = useMemo(() => {
    const rows = [];
    for(const fl of sh.floors) {
      for(let riBase = 0; riBase < 4; riBase++) {
        const zone = riBase % 2 === 0 ? "Part A" : "Part B";
        const trd  = riBase < 2 ? "ARCH" : "MEP";
        const row  = fl.r[riBase];
        if(!row) continue;

        const tradeCells = {};
        for(const c of row.c) {
          const h = c[2];
          if(!tradeCells[h]) tradeCells[h] = { minT: c[0], maxT: c[0], val: c[1] };
          else {
            tradeCells[h].minT = Math.min(tradeCells[h].minT, c[0]);
            tradeCells[h].maxT = Math.max(tradeCells[h].maxT, c[0]);
            if(c[1]==="C") tradeCells[h].val = "C";
            else if(c[1]!==null && tradeCells[h].val===null) tradeCells[h].val = c[1];
          }
        }

        const overriddenCells = {};
        for(const [h, info] of Object.entries(tradeCells)) {
          const pct = getPct(block, h, fl.f, riBase);
          let val = info.val;
          if(pct !== null) {
            if(pct >= 100) val = "C";
            else if(pct > 0) val = String(pct/100);
            else val = null;
          }
          const startIso = sh.dates[info.minT] || null;
          const endIso   = sh.dates[info.maxT] || null;
          overriddenCells[h] = {
            startIso, endIso, val,
            status: getScheduleStatus(val, startIso, endIso),
            startDay: dayDiff(startIso),
            endDay: dayDiff(endIso),
          };
        }

        rows.push({ fl: fl.f, zone, trd, ri: riBase, tradeCells: overriddenCells });
      }
    }
    return rows;
  }, [block, getPct]);

  // Filter by floor selection
  const filteredRows = useMemo(() => {
    if(floorFilter === "all") return scheduleData;
    if(floorFilter === "active") {
      return scheduleData.filter(row =>
        Object.values(row.tradeCells).some(c => c.status === "inprogress" || c.status === "atrisk")
      );
    }
    return scheduleData.filter(r => r.fl === Number(floorFilter));
  }, [scheduleData, floorFilter]);

  // Apply collapse: group rows by floor, keep only first row when collapsed
  const visibleRows = useMemo(() => {
    return filteredRows.filter(row => {
      if(!collapsedFloors.has(row.fl)) return true;
      // When collapsed, only show the first sub-row (ri=0, Part A ARCH)
      return row.ri === 0;
    });
  }, [filteredRows, collapsedFloors]);

  const floors = useMemo(() => [...new Set(sh.floors.map(f=>f.f))], [block]);
  const allFloors = sh.floors.map(f=>f.f);
  const allCollapsed = collapsedFloors.size === allFloors.length;

  // Status config
  const STATUS = {
    complete:   { label:"Complete",    icon:"✓", border:"#70AD47", bg:"rgba(112,173,71,.12)",  text:"#70AD47" },
    inprogress: { label:"In Progress", icon:"▶", border:"#5B9BD5", bg:"rgba(91,155,213,.12)",  text:"#5B9BD5" },
    atrisk:     { label:"At Risk",     icon:"⚠", border:"#FFC000", bg:"rgba(255,192,0,.12)",   text:"#FFC000" },
    notstarted: { label:"Not Started", icon:"○", border:"#333",    bg:"transparent",           text:"#444"    },
  };

  // Helper: get worst status across all sub-rows for a floor (for collapsed summary)
  const getFloorSummary = (fl) => {
    const flRows = scheduleData.filter(r => r.fl === fl);
    const allStatuses = flRows.flatMap(r => Object.values(r.tradeCells).map(c => c.status));
    if(allStatuses.includes("atrisk")) return "atrisk";
    if(allStatuses.includes("inprogress")) return "inprogress";
    if(allStatuses.every(s => s === "complete")) return "complete";
